name: covla
display_name: "CoVLA: Comprehensive Vision-Language-Action Dataset"
description: "Large-scale vision-language-action dataset for autonomous driving with 80+ hours of driving data, 10k scenes, paired with natural language descriptions and vehicle CAN actions."
paper_url: "https://arxiv.org/abs/2408.10845"
project_url: "https://turingmotors.github.io/covla-ad/"
github_url: ""
huggingface_id: "turing-motors/CoVLA-Dataset-Mini"
modalities:
  - vision
  - language
  - action
tasks:
  - autonomous-driving
  - vision-language-action
  - end-to-end-driving
license: "Non-commercial"
size_hint: "Mini: 50 scenes (~75GB full, ~200MB metadata-only), Full: 10k scenes"
tags:
  - VLA
  - autonomous-driving
  - multimodal
  - turing-motors
  - WACV2025
download:
  method: huggingface
  url: "turing-motors/CoVLA-Dataset-Mini"
  splits:
    metadata: "*.jsonl,*.csv,*.json,*.md"
    video: "video_samples/*.mp4"
    full: "*"
